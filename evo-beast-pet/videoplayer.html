<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>视频分析</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;background:#111;color:#eee;font-family:sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:20px}
video{max-width:95vw;max-height:80vh;border-radius:8px}
.controls{margin:10px 0;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.controls button{padding:6px 14px;background:#333;border:1px solid #555;border-radius:4px;cursor:pointer;color:#eee;font-size:13px}
.controls button:hover{background:#555}
.info{color:#999;font-size:12px;margin-top:8px;text-align:center;max-width:600px;line-height:1.6}
.frame-gallery{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center}
.frame-gallery img{max-width:200px;border:1px solid #444;border-radius:4px}
</style></head>
<body>
<video id="v" controls autoplay muted>
  <source src="ref_video.mp4" type="video/mp4">
</video>
<div class="controls">
  <button onclick="document.getElementById('v').play()">▶播放</button>
  <button onclick="document.getElementById('v').pause()">⏸暂停</button>
  <button onclick="document.getElementById('v').currentTime=0">⏪重播</button>
  <button onclick="snapshot()">📸截图当前帧</button>
  <button onclick="document.getElementById('v').playbackRate-=0.25">🐢慢速-</button>
  <button onclick="document.getElementById('v').playbackRate+=0.25">🐇快进+</button>
  <span id="fps" style="color:#888;font-size:12px">1.0x</span>
</div>
<div class="info" id="info">加载中...</div>
<div class="frame-gallery" id="gallery"></div>
<script>
const v=document.getElementById('v');
const info=document.getElementById('info');
const gallery=document.getElementById('gallery');

v.addEventListener('loadedmetadata',()=>{
  info.innerHTML=`
    时长: ${Math.floor(v.duration/60)}:${String(Math.floor(v.duration%60)).padStart(2,'0')} |
    分辨率: ${v.videoWidth}×${v.videoHeight} |
    帧数: ${Math.round(v.duration*30)}帧
  `;
});
v.onratechange=()=>{document.getElementById('fps').textContent=v.playbackRate.toFixed(2)+'x'};

// Auto-capture key frames
let framesTaken=0;
v.addEventListener('timeupdate',()=>{
  if(framesTaken>=20)return;
  // Capture every 0.5 seconds
  if(v.currentTime>framesTaken*0.5+0.25){
    snapshot();
  }
});

function snapshot(){
  const c=document.createElement('canvas');
  c.width=v.videoWidth;
  c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  const img=document.createElement('img');
  img.src=c.toDataURL('image/jpeg',0.7);
  img.title=`${Math.floor(v.currentTime/60)}:${String(Math.floor(v.currentTime%60)).padStart(2,'0')}`;
  gallery.appendChild(img);
  framesTaken++;
  if(gallery.children.length>30)gallery.removeChild(gallery.firstChild);
}
</script>
</body>
</html>
